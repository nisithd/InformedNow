services:
  nginx-proxy:
    image: jwilder/nginx-proxy
    container_name: nginx-proxy
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./certs:/etc/nginx/certs:ro
      - ./vhost.d:/etc/nginx/vhost.d
      - ./html:/usr/share/nginx/html
      - /var/run/docker.sock:/tmp/docker.sock:ro
    networks:
      - proxy

  acme-companion:
    image: nginxproxy/acme-companion
    container_name: nginx-proxy-acme
    restart: unless-stopped
    depends_on:
      - "nginx-proxy"
    volumes_from:
       - "nginx-proxy"
    volumes:
       - ./certs:/etc/nginx/certs:rw
       - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
        - DEFAULT_EMAIL=${email}
    networks:
      - proxy

  frontend:
    build: frontend
    image: frontend
    container_name: frontend
    restart: unless-stopped
    expose:
        - "80"
    volumes:
      - ./uploads:/uploads:ro
    networks:
      - proxy
    environment:
      - VIRTUAL_HOST=localhost
      - LETSENCRYPT_HOST=localhost

  backend:
    build: backend
    image: backend
    container_name: backend
    restart: unless-stopped
    volumes:
      - ./db:/home/app/database:rw
      - ./uploads:/home/app/uploads:rw
      - ./uploads:/usr/share/nginx/html/uploads:ro
    networks:
      - proxy

  frontend-proxy:
    image: nginx:1.29-alpine-slim
    container_name: frontend-proxy
    restart: unless-stopped
    volumes:
      - ./frontend-proxy/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "4000"
    environment:
      - VIRTUAL_HOST=localhost
      - VIRTUAL_PORT=4000
    networks:
      - proxy
  # mongo:
  #   image: mongo
  #   container_name: mongo
  #   restart: always
  #   volumes:
  #     - ./data:/data

networks:
  proxy:
    driver: bridge
        
